services:
  web:
    build: ./web
    container_name: web
    hostname: web
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      GITHUB_URL: ${GITHUB_URL:-https://github.com/WiederShahaf/picture-server}
    restart: unless-stopped
